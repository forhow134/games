name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install and Build all games
        run: |
          for game in 01-island-treasure 02-whack-a-mole 03-space-shooter 04-tower-defense; do
            echo "Building $game..."
            cd $game
            npm ci
            npx vite build
            cd ..
          done

      - name: Prepare artifact structure
        run: |
          mkdir -p _site
          for game in 01-island-treasure 02-whack-a-mole 03-space-shooter 04-tower-defense; do
            short_name=$(echo $game | cut -d'-' -f2)
            cp -r $game/dist _site/$short_name
          done

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
