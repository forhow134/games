name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build 01-island-treasure
        run: npm ci && npx vite build
        working-directory: 01-island-treasure

      - name: Build 02-whack-a-mole
        run: npm ci && npx vite build
        working-directory: 02-whack-a-mole

      - name: Build 03-space-shooter
        run: npm ci && npx vite build
        working-directory: 03-space-shooter

      - name: Build 04-tower-defense
        run: npm ci && npx vite build
        working-directory: 04-tower-defense

      - name: Prepare artifact structure
        run: |
          mkdir -p _site
          cp -r 01-island-treasure/dist _site/island-treasure
          cp -r 02-whack-a-mole/dist _site/whack-a-mole
          cp -r 03-space-shooter/dist _site/space-shooter
          cp -r 04-tower-defense/dist _site/tower-defense
          ls -la _site/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
